configVersion: 1
project: 'backend'
---
image: builder
from: golang:1.16.2-stretch
docker:
  WORKDIR: /go/src/gitlab.com/distributed_lab/acs/mail-module
git:
- add: /
  to: /go/src/gitlab.com/distributed_lab/acs/mail-module
  stageDependencies:
    setup:
    - "**/*"
shell:
  setup:
  - export CGO_ENABLED=0
  - export GO111MODULE=off
  - export GOOS=linux
  - go build  -o /usr/local/bin/mail-module  /go/src/gitlab.com/distributed_lab/acs/mail-module

---
image: service
from: alpine:3.9
docker:
  ENTRYPOINT: mail-module
shell:
  setup:
  - apk add --no-cache ca-certificates
import:
- image: builder
  add: /usr/local/bin/mail-module
  to: /usr/local/bin/mail-module
  after: setup
